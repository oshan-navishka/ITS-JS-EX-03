<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case-01</title>
    <link rel="stylesheet" href="asset/lib/normalize.css">

    <style>
        body{
            background-color: rgb(156, 207, 190);
        }
        
        section{
            display: flex;
            text-align: center;
            height: 90vh;
            align-items: center;
            margin-left: 50px;
            
        }
        div{
            font-size: 1.5rem;
            font-weight: bold;
            color: rgb(89, 65, 225);
            
        }

        img{
            width: 80px;
            height: auto;
            margin-left: 30px;
            margin-right: 30px;
        }
        
        .underline{
            width: 62%;
            height: 2px;
            background-color: rgb(96, 94, 94);
            bottom: 10px;
            position: fixed;
            margin-bottom: 350px;
            margin-left: 37px;
        }

        .last img{
            width: 400px;
            height: auto;
            margin-left: 40px;
            margin-bottom: 69px;
        }

        .control-btn{
            position: fixed;
            top: 20px;
            width: 110px;
            padding: 12px 16px;
            border: none;
            border-radius: 999px;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            z-index: 10;
        }

        .control-btn:hover{
            transform: translateY(-2px);
            box-shadow: 0 14px 24px rgba(0, 0, 0, 0.22);
        }

        .control-btn:active{
            transform: translateY(0);
            opacity: 0.92;
        }

        .start-btn{
            left: 20px;
            background: linear-gradient(135deg, #3ddc97, #1f9d55);
        }

        .stop-btn{
            left: 140px;
            background: linear-gradient(135deg, #ff7b7b, #d64545);
        }

    </style>
</head> 
<body>
    <button class="control-btn start-btn" id="startBtn" type="button">Start</button>
    <button class="control-btn stop-btn" id="stopBtn" type="button">Stop</button>

    <section>

        <img src="asset/julientromeur-doctor-400_512.gif" alt="doctor">

        <div>A</div>

        <img src="asset/julientromeur-doctor-400_512.gif" alt="doctor">

        <div>B</div>

        <img src="asset/julientromeur-doctor-400_512.gif" alt="doctor">

        <div>C</div>

        <img src="asset/julientromeur-doctor-400_512.gif" alt="doctor">

        <div>D</div>

        <img src="asset/julientromeur-doctor-400_512.gif" alt="doctor">

        <div>E</div>
        
        <img src="asset/julientromeur-doctor-400_512.gif" alt="doctor">

        <div>F</div>

        <div class="underline"></div>

        <div class="last">
            <img src="asset/output-onlinegiftools.gif" alt="home">
        </div>
        

    </section>

    <script>
        var list = ['A' ,'B', 'C', 'D', 'E', 'F'];
        var animationId = null;

        function renderLetters(){
            list.unshift(list.pop());
            for(let i = 0; i < list.length; i++){
                document.querySelectorAll('div')[i].innerText = list[i];
            }
        }

        function startAnimation(){
            if(animationId !== null){
                return;
            }

            animationId = setInterval(renderLetters, 800);
        }

        function stopAnimation(){
            clearInterval(animationId);
            animationId = null;
        }

        document.getElementById('startBtn').addEventListener('click', startAnimation);
        document.getElementById('stopBtn').addEventListener('click', stopAnimation);
        
        startAnimation();
    </script>
</body>
</html>
